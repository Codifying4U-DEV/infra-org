# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "infra-org"

[setup]
script = '''
cd "$CODEX_WORKTREE_PATH"

# Validación inicial
git worktree list
git status
pwd

# Node con nvm
export NVM_DIR="$HOME/.nvm"

if [ -s "$NVM_DIR/nvm.sh" ]; then
  . "$NVM_DIR/nvm.sh"
fi

# Usar Node 20 LTS
if [ -f ".nvmrc" ]; then
  nvm install
  nvm use
else
  nvm install 20
  nvm use 20
fi

node -v
npm -v

# Instalar dependencias si existe package.json
if [ -f "package.json" ]; then
  npm install
fi

# Validar Pulumi
pulumi version

# Validar gcloud sin forzar login
gcloud config get-value project || true

# Validación final
git worktree list
git status
'''

[cleanup]
script = '''
cd "$CODEX_WORKTREE_PATH"

# limpiar node modules (opcional)
rm -rf node_modules

# limpiar outputs de Pulumi
rm -rf .pulumi

# limpiar temporales
rm -rf dist build
'''
